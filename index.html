<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><title>Redirection Obsidian</title></head>
<body>
<script>
  const params = new URLSearchParams(window.location.search);
  const uid = params.get('uid');
  if (uid) {
    window.location.href = 'obsidian://adv-uri?uid=' + encodeURIComponent(uid);
  }
</script>
</body>
</html>
